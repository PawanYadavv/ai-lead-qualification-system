services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ai-lead-nginx
    depends_on:
      - api
    ports:
      - "${NGINX_HOST_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: ai-lead-api
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      API_BASE_URL: ${API_BASE_URL:-http://localhost}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost}
    depends_on:
      - db
    expose:
      - "8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips=*

  db:
    image: postgres:16-alpine
    container_name: ai-lead-db
    environment:
      POSTGRES_DB: lead_qualification
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: ai-lead-qdrant
    profiles:
      - vector
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
